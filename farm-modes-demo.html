<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Farmhouse Ledger — Light & Dark</title><style>*{box-sizing:border-box}body{margin:0;background:#151915;font:15px Inter,system-ui,sans-serif}.intro{max-width:1500px;margin:auto;padding:32px 20px 12px;color:#faf6f0}.intro h1{margin:0;font:700 clamp(27px,5vw,42px) Georgia,serif}.intro p{max-width:730px;color:#d6d1c7;line-height:1.55}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:28px;max-width:1500px;margin:auto;padding:20px}.pane{padding:14px;border-radius:18px}.dark-pane{background:#1d241a;border:1px solid #6b7a5e}.light-pane{background:#f0e9df;border:1px solid #d6cabc}.label{margin:0 0 10px;font:700 11px ui-monospace,monospace;letter-spacing:.1em}.dark-pane .label{color:#e8c88a}.light-pane .label{color:#a66f2e}home-management-card{display:block}.farm-dark{--housing:#2c3527;--panel:#374134;--panel-2:#4a5540;--well:#263022;--bezel:#6b7a5e;--hairline:#718068;--brass:#c9944a;--brass-dim:#a57636;--needle:#c1623b;--ledger:#b6c6a7;--ink:#faf6f0;--ink-dim:#d6d1c7;--ink-faint:#abb2a4;--font-display:Georgia,serif}.farm-light{--housing:#f0e9df;--panel:#faf6f0;--panel-2:#fffdf9;--well:#f4ede3;--bezel:#d6cabc;--hairline:#e2d8cb;--brass:#a66f2e;--brass-dim:#8c5d26;--needle:#b54f31;--ledger:#476449;--ink:#2a2a26;--ink-dim:#5c5c54;--ink-faint:#77776f;--font-display:Georgia,serif}@media(max-width:900px){.grid{grid-template-columns:1fr}}</style><script type="module" src="./dist/home-management-card.js"></script></head><body><div class="intro"><h1>Farmhouse Ledger in both modes</h1><p>The dark surface stays rooted in olive and harvest gold. The light surface shifts to parchment, uses deeper gold for accessible labels, and keeps completion green and urgency terracotta consistent.</p></div><div class="grid"><section class="pane dark-pane"><p class="label">DARK MODE · OLIVE AFTER HOURS</p><home-management-card class="farm-dark" id="dark"></home-management-card></section><section class="pane light-pane"><p class="label">LIGHT MODE · PARCHMENT DAYLIGHT</p><home-management-card class="farm-light" id="light"></home-management-card></section></div><script type="module">const iso=(n,h=9)=>{let d=new Date;d.setHours(h,0,0,0);d.setDate(d.getDate()+n);return d.toISOString()};const ev={'calendar.family':[{summary:'Dentist — Ada',start:iso(0,15)},{summary:'Family dinner at Nana’s',start:iso(2,18)}],'calendar.school':[{summary:'School pickup',start:iso(0,14)},{summary:'Library books due',start:iso(4,8)}]};const base={'todo.ada_chores':[{uid:'a1',summary:'Make bed',status:'completed'},{uid:'a2',summary:'Feed the dog',status:'needs_action'}],'todo.ada_schoolwork':[{uid:'a3',summary:'Read 20 minutes',status:'completed'},{uid:'a4',summary:'Math worksheet',status:'needs_action'}],'todo.theo_chores':[{uid:'t1',summary:'Unload dishwasher',status:'needs_action'}],'todo.theo_schoolwork':[{uid:'t2',summary:'Science project notes',status:'needs_action'}]};function hass(){let lists=structuredClone(base);return{states:Object.fromEntries([...Object.keys(ev).map(x=>[x,{state:'on',attributes:{friendly_name:x.slice(9)}}]),...Object.keys(lists).map(x=>[x,{state:'0',attributes:{friendly_name:x.slice(5)}}])]),async callWS(m){return m.type==='calendar/event/list'?ev[m.entity_id]||[]:{items:lists[m.entity_id]||[]}},async callService(d,s,data,target){let i=lists[target.entity_id].find(x=>x.uid===data.item);if(i)i.status=data.status}}}const cfg={type:'custom:home-management-card',title:'Home Ledger',calendar_entities:Object.keys(ev),kids:[{name:'Ada',icon:'A',chores_entity:'todo.ada_chores',schoolwork_entity:'todo.ada_schoolwork'},{name:'Theo',icon:'T',chores_entity:'todo.theo_chores',schoolwork_entity:'todo.theo_schoolwork'}]};for(let id of['dark','light']){let c=document.getElementById(id);c.hass=hass();c.setConfig(cfg)}</script></body></html>
